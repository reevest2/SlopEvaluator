name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: ['9.0.x', '10.0.x']
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ matrix.dotnet-version }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-${{ matrix.dotnet-version }}-
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}-${{ matrix.dotnet-version }}
          path: |
            **/bin/Release/
          retention-days: 7

  unit-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-10.0.x-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore and build
        run: dotnet build -c Release

      - name: Run unit tests
        run: dotnet test --no-build -c Release --logger trx --results-directory TestResults --filter "Category!=Integration"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: TestResults/
          retention-days: 30

  integration-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-10.0.x-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore and build
        run: dotnet build -c Release

      - name: Run integration tests
        run: dotnet test --no-build -c Release --logger trx --results-directory TestResults --filter "Category=Integration"

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: TestResults/
          retention-days: 30

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Run security analysis with gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Run dotnet security audit
        run: dotnet list package --vulnerable --include-transitive

  code-analysis:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Run dotnet format analysis
        run: dotnet format --verify-no-changes --verbosity diagnostic

      - name: Run lint checks
        run: dotnet build -c Release /p:TreatWarningsAsErrors=true

  quality-gate:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security-scan, code-analysis]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-10.0.x-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build
        run: dotnet build -c Release

      - name: Self-scan (full report)
        run: dotnet run --project SlopEvaluator.Cli -c Release -- scan .

      - name: Quality gate (must not regress)
        run: dotnet run --project SlopEvaluator.Cli -c Release -- gate . --threshold 0.62

  deploy:
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish release artifacts
        run: dotnet publish SlopEvaluator.Cli -c Release -o ./publish

      - name: Upload deploy artifacts
        uses: actions/upload-artifact@v4
        with:
          name: slop-evaluator-release
          path: ./publish/
          retention-days: 90

      # Rollback: if deployment fails, the previous artifact can be
      # re-deployed by re-running the prior successful workflow run.
      # Use `gh run rerun <run-id>` to rollback to a known-good state.

  smoke-tests:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build for smoke tests
        run: dotnet build -c Release

      - name: Smoke test - health check CLI
        run: dotnet run --project SlopEvaluator.Cli -c Release -- scan . --format json > /dev/null

      - name: Smoke test - sanity check exit code
        run: dotnet run --project SlopEvaluator.Cli -c Release -- gate . --threshold 0.10

  performance:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build for benchmark
        run: dotnet build -c Release

      - name: Run performance benchmark
        run: dotnet run --project SlopEvaluator.Cli -c Release -- scan . --format json
        env:
          PERF_BENCHMARK: true

      - name: Upload perf results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: TestResults/
          retention-days: 30
